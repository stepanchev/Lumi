<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="styles/style.css" />
  </head>
  <body>
     <div id="header"></div>
    <main class="container">
      <div class="courses">
        <div class="course-card" data-course="html" >
          <div>
            <h2>HTML</h2>
            <p>Основы разметки</p>
          </div>
          <div class="course-card-button">
            <span class="progress-text" data-progress="3" data-total="10">0/10</span>
          </div>
        </div>

        <div class="course-card" data-course="css">
          <div>
            <h2>CSS</h2>
            <p>Стили и оформление</p>
          </div>
          <div class="course-card-button">
            <span class="progress-text" data-progress="3" data-total="10">0/10</span>
          </div>
        </div>

        <div class="course-card" data-course="JavaScript">
          <div>
            <h2>JavaScript</h2>
            <p>Логика и интерактив</p>
          </div>
          <div class="course-card-button">
            <span class="progress-text" data-progress="3" data-total="10">0/10</span>
          </div>
        </div>
      </div>
    </main>
  </body>
  <script src="script.js"></script>
</html>
